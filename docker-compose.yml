version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: nepse-postgres
    environment:
      POSTGRES_USER: nepse
      POSTGRES_PASSWORD: nepse
      POSTGRES_DB: nepse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nepse -d nepse_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nepse-api:
    build: .
    container_name: nepse-scrapper
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nepse:nepse@postgres:5432/nepse_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
