name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run unit tests (auth + API routes)
        run: python -m pytest tests/test_auth.py tests/test_api.py -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        # ruff.toml at repo root configures target-version, select, and ignore
        run: ruff check app/ tests/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nepse-scrapper:ci .

      - name: Verify image starts
        run: |
          docker run -d --name nepse-test -p 8000:8000 nepse-scrapper:ci
          sleep 5
          # Health check — will show 'last_sync_at: null' since no Nepal IP,
          # but the service should start and respond cleanly
          docker logs nepse-test
          # 200 means server is up; geo-block only affects data routes
          curl -sf http://localhost:8000/health | python3 -m json.tool
          docker stop nepse-test
